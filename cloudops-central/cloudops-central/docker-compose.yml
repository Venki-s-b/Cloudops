version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudops-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/cloudops.db}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8001,http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@company.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      VIEWER_EMAIL: ${VIEWER_EMAIL:-viewer@company.com}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD:?VIEWER_PASSWORD must be set in .env}
      # AWS (optional — only needed if not using IAM roles on EC2/ECS)
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      # Azure (optional)
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
    volumes:
      - cloudops-data:/data
    networks:
      - cloudops-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (nginx static server) ──────────────────────────────────────────
  frontend:
    image: nginx:1.27-alpine
    container_name: cloudops-frontend
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cloudops-net
    depends_on:
      - backend

volumes:
  cloudops-data:

networks:
  cloudops-net:
    driver: bridge
